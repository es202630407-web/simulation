<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>우리은하 회전 속도 곡선</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Malgun Gothic', sans-serif;
    background: #0b0e1a;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 16px;
    margin: 0;
  }
  h1 { margin: 0; font-size: 22px; text-align: center; }
  .panels {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    width: 100%;
  }
  .panel {
    background: #161a2c;
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 0 0 16px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  h2 { color: #ffd166; margin: 0; font-size: 15px; text-align: center; }
  canvas { display: block; }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    width: 100%;
    justify-content: center;
  }
  input[type=range] { width: 160px; }
  .val { color: #ffd166; font-size: 13px; min-width: 80px; }
  .desc { font-size: 12px; color: #9aa0c0; text-align: center; line-height: 1.5; }
  .legend {
    display: flex;
    gap: 12px;
    justify-content: center;
    font-size: 12px;
    flex-wrap: wrap;
  }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .swatch { width: 14px; height: 3px; display: inline-block; }
  .slider-vertical-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  input[type=range].vertical {
    writing-mode: vertical-lr;
    direction: rtl;
    width: 28px;
    height: 220px;
  }
</style>
</head>
<body>

<h1>우리은하의 회전 속도 곡선 시뮬레이션</h1>

<div class="panels">

  <!-- 1. 강체 회전 -->
  <div class="panel">
    <h2>강체 회전</h2>
    <canvas id="rigidCanvas" width="260" height="220"></canvas>
    <div class="desc">각속도(ω)가 일정 → 바깥쪽일수록 선속도 빨라짐</div>
    <div class="slider-row">
      <span>각속도 ω</span>
      <input type="range" id="omegaSlider" min="20" max="300" step="10" value="100">
      <span class="val" id="omegaVal">ω = 100</span>
    </div>
  </div>

  <!-- 2. 케플러 회전 -->
  <div class="panel">
    <h2>케플러 회전</h2>
    <canvas id="keplerCanvas" width="260" height="220"></canvas>
    <div class="desc">중심 질량(M)이 클수록 전체 속도 높아짐<br>멀어질수록 속도 감소 (v ∝ 1/√r)</div>
    <div class="slider-row">
      <span>중심 질량 M</span>
      <input type="range" id="massSlider" min="0.2" max="3" step="0.1" value="1">
      <span class="val" id="massVal">M = 1.0</span>
    </div>
  </div>

  <!-- 3. 우리은하 회전 속도 곡선 -->
  <div class="panel">
    <h2>우리은하 회전 속도 곡선</h2>
    <div style="display:flex; gap:10px; align-items:center;">
      <canvas id="milkyCanvas" width="380" height="300"></canvas>
      <div class="slider-vertical-box">
        <span style="font-size:12px; color:#ffd166;">암흑물질 양</span>
        <input type="range" class="vertical" id="dmSlider" min="0" max="1" step="0.05" value="0">
        <span class="val" id="dmVal" style="text-align:center;">0.00</span>
      </div>
    </div>
    <div class="legend">
      <span><span class="swatch" style="border-top:2px dashed #cfcfcf;"></span>암흑물질 없음</span>
      <span><span class="swatch" style="border-top:2px dashed #ff8a8a;"></span>암흑물질 충분</span>
      <span><span class="swatch" style="background:#ff3b3b;"></span>현재 곡선</span>
    </div>
  </div>

</div>

<script>

/* =============================================
   공통 축 그리기 함수
   ============================================= */
function drawAxes(ctx, w, h, mg, xMax, yMax, xLabel, yLabel, xTicks, yTicks) {
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#0e1224';
  ctx.fillRect(0, 0, w, h);

  const pw = w - mg.left - mg.right;
  const ph = h - mg.top - mg.bottom;

  function px(x, y) {
    return [mg.left + (x / xMax) * pw, mg.top + ph - (y / yMax) * ph];
  }

  // 격자
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  xTicks.forEach(x => {
    const [cx] = px(x, 0);
    ctx.beginPath(); ctx.moveTo(cx, mg.top); ctx.lineTo(cx, mg.top + ph); ctx.stroke();
  });
  yTicks.forEach(y => {
    const [, cy] = px(0, y);
    ctx.beginPath(); ctx.moveTo(mg.left, cy); ctx.lineTo(mg.left + pw, cy); ctx.stroke();
  });

  // 축
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mg.left, mg.top);
  ctx.lineTo(mg.left, mg.top + ph);
  ctx.lineTo(mg.left + pw, mg.top + ph);
  ctx.stroke();

  // 눈금 숫자
  ctx.fillStyle = '#9aa0c0'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  xTicks.forEach(x => {
    const [cx, cy] = px(x, 0);
    ctx.fillText(x, cx, cy + 14);
  });
  ctx.textAlign = 'right';
  yTicks.forEach(y => {
    const [cx, cy] = px(0, y);
    ctx.fillText(y, cx - 4, cy + 4);
  });

  // 축 라벨
  ctx.fillStyle = '#cfd2e3'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(xLabel, mg.left + pw / 2, h - 5);
  ctx.save();
  ctx.translate(12, mg.top + ph / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(yLabel, 0, 0);
  ctx.restore();

  return { pw, ph, px };
}


/* =============================================
   1. 강체 회전 그래프
   ============================================= */
const rigidCanvas = document.getElementById('rigidCanvas');
const rctx = rigidCanvas.getContext('2d');

function drawRigidGraph(omega) {
  const w = 260, h = 220;
  const mg = { left: 50, right: 10, top: 20, bottom: 35 };
  const xMax = 5, yMax = 1200;

  const { pw, ph, px } = drawAxes(
    rctx, w, h, mg, xMax, yMax,
    '거리 r (kpc)', '선속도 (km/s)',
    [0,1,2,3,4,5], [0,300,600,900,1200]
  );

  // 기준선 (omega=100일 때, 연하게)
  rctx.strokeStyle = 'rgba(77,163,255,0.2)';
  rctx.lineWidth = 1;
  rctx.beginPath();
  for (let i = 0; i <= 100; i++) {
    const x = (i / 100) * xMax;
    const v = 100 * x;
    if (v > yMax) break;
    const [ppx, ppy] = px(x, v);
    if (i === 0) rctx.moveTo(ppx, ppy); else rctx.lineTo(ppx, ppy);
  }
  rctx.stroke();

  // 현재 선속도 곡선: v = omega * r (1200 넘으면 끊음)
  rctx.strokeStyle = '#4da3ff';
  rctx.lineWidth = 2.5;
  rctx.beginPath();
  let started = false;
  for (let i = 0; i <= 100; i++) {
    const x = (i / 100) * xMax;
    const v = omega * x;
    if (v > yMax) break;
    const [ppx, ppy] = px(x, v);
    if (!started) { rctx.moveTo(ppx, ppy); started = true; }
    else rctx.lineTo(ppx, ppy);
  }
  rctx.stroke();

  // 각속도 수평선 (yMax 안에 들어올 때만)
  if (omega <= yMax) {
    rctx.strokeStyle = '#c77dff';
    rctx.lineWidth = 2;
    rctx.setLineDash([5, 3]);
    const [ax1, ay1] = px(0, omega);
    const [ax2, ay2] = px(xMax, omega);
    rctx.beginPath(); rctx.moveTo(ax1, ay1); rctx.lineTo(ax2, ay2); rctx.stroke();
    rctx.setLineDash([]);
  }

  // 범례
  rctx.font = '11px sans-serif'; rctx.textAlign = 'left';
  rctx.fillStyle = '#4da3ff'; rctx.fillText('선속도 v = rω', mg.left + 2, mg.top + 12);
  rctx.fillStyle = '#c77dff'; rctx.fillText('각속도 ω = 일정', mg.left + 2, mg.top + 26);
}


/* =============================================
   2. 케플러 회전 그래프
   ============================================= */
const keplerCanvas = document.getElementById('keplerCanvas');
const kctx = keplerCanvas.getContext('2d');

function drawKeplerGraph(mass) {
  const w = 260, h = 220;
  const mg = { left: 50, right: 10, top: 20, bottom: 35 };
  const xMax = 5, yMax = 400;
  const k = 220 * Math.sqrt(mass);

  const { pw, ph, px } = drawAxes(
    kctx, w, h, mg, xMax, yMax,
    '거리 r (kpc)', '속도',
    [0,1,2,3,4,5], [0,100,200,300,400]
  );

  // 기준선 (M=1, 연하게)
  kctx.strokeStyle = 'rgba(93,214,138,0.2)';
  kctx.lineWidth = 1;
  kctx.beginPath();
  for (let i = 1; i <= 100; i++) {
    const x = (i / 100) * xMax;
    const v = 220 / Math.sqrt(Math.max(x, 0.1));
    const [ppx, ppy] = px(x, Math.min(v, yMax));
    if (i === 1) kctx.moveTo(ppx, ppy); else kctx.lineTo(ppx, ppy);
  }
  kctx.stroke();

  // 현재 선속도 곡선
  kctx.strokeStyle = '#5dd68a'; kctx.lineWidth = 2.5;
  kctx.beginPath();
  for (let i = 1; i <= 100; i++) {
    const x = (i / 100) * xMax;
    const v = k / Math.sqrt(Math.max(x, 0.1));
    const [ppx, ppy] = px(x, Math.min(v, yMax));
    if (i === 1) kctx.moveTo(ppx, ppy); else kctx.lineTo(ppx, ppy);
  }
  kctx.stroke();

  // 각속도 곡선
  kctx.strokeStyle = '#ffb24d'; kctx.lineWidth = 2;
  kctx.setLineDash([5, 3]);
  kctx.beginPath();
  for (let i = 1; i <= 100; i++) {
    const x = (i / 100) * xMax;
    const omega = k / Math.pow(Math.max(x, 0.1), 1.5);
    const [ppx, ppy] = px(x, Math.min(omega, yMax));
    if (i === 1) kctx.moveTo(ppx, ppy); else kctx.lineTo(ppx, ppy);
  }
  kctx.stroke();
  kctx.setLineDash([]);

  // 범례
  kctx.font = '11px sans-serif'; kctx.textAlign = 'left';
  kctx.fillStyle = '#5dd68a'; kctx.fillText('선속도 v = k/√r', mg.left + 2, mg.top + 12);
  kctx.fillStyle = '#ffb24d'; kctx.fillText('각속도 ω = k/r^1.5', mg.left + 2, mg.top + 26);
}


/* =============================================
   3. 우리은하 회전 속도 곡선
   ============================================= */
const milkyCanvas = document.getElementById('milkyCanvas');
const mctx = milkyCanvas.getContext('2d');

function rotationCurve(r, dm) {
  if (r <= 1) return 220 * r;
  const vK = 220 / Math.sqrt(r);
  const blend = Math.min(Math.max((r - 1) / 2, 0), 1);
  return vK * (1 - blend * dm) + 220 * (blend * dm);
}

function drawMilkyWay(dm) {
  const w = 380, h = 300;
  const mg = { left: 55, right: 15, top: 25, bottom: 40 };
  const xMax = 15, yMax = 270;

  const { pw, ph, px } = drawAxes(
    mctx, w, h, mg, xMax, yMax,
    '은하 중심에서부터의 거리 (kpc)', '회전 속도 (km/s)',
    [0,3,6,9,12,15], [0,50,100,150,200,250]
  );

  // 영역 구분선
  mctx.strokeStyle = 'rgba(255,255,255,0.2)';
  mctx.setLineDash([3, 3]);
  [1, 3].forEach(r => {
    const [cx] = px(r, 0);
    mctx.beginPath(); mctx.moveTo(cx, mg.top); mctx.lineTo(cx, mg.top + ph); mctx.stroke();
  });
  mctx.setLineDash([]);

  mctx.fillStyle = '#9aa0c0'; mctx.font = '11px sans-serif'; mctx.textAlign = 'left';
  mctx.fillText('강체', px(0.1, 0)[0], mg.top + 14);
  mctx.fillText('케플러', px(1.2, 0)[0], mg.top + 14);
  mctx.fillText('평탄한 영역', px(5.5, 0)[0], mg.top + 14);

  // 곡선 그리기 함수
  function drawCurve(dmAmt, color, lw, dashed) {
    mctx.strokeStyle = color; mctx.lineWidth = lw;
    mctx.setLineDash(dashed ? [6, 4] : []);
    mctx.beginPath();
    for (let i = 0; i <= 300; i++) {
      const r = (i / 300) * xMax;
      const v = rotationCurve(r === 0 ? 0.001 : r, dmAmt);
      const [cx, cy] = px(r, v);
      if (i === 0) mctx.moveTo(cx, cy); else mctx.lineTo(cx, cy);
    }
    mctx.stroke(); mctx.setLineDash([]);
  }

  drawCurve(0.0, '#cfcfcf', 1.5, true);
  drawCurve(1.0, '#ff8a8a', 1.5, true);
  drawCurve(dm,  '#ff3b3b', 3,   false);

  // 태양 위치
  const [sx, sy] = px(8.5, 220);
  mctx.strokeStyle = 'rgba(255,209,102,0.5)';
  mctx.setLineDash([3, 3]);
  mctx.beginPath(); mctx.moveTo(sx, mg.top); mctx.lineTo(sx, mg.top + ph); mctx.stroke();
  mctx.setLineDash([]);
  mctx.fillStyle = '#ffd166';
  mctx.beginPath(); mctx.arc(sx, sy, 5, 0, Math.PI * 2); mctx.fill();
  mctx.fillStyle = '#ffd166'; mctx.font = '11px sans-serif'; mctx.textAlign = 'left';
  mctx.fillText('태양 (8.5kpc)', sx + 6, sy - 6);
}


/* =============================================
   슬라이더 이벤트 연결 및 초기 렌더링
   ============================================= */
const omegaSlider = document.getElementById('omegaSlider');
const omegaVal    = document.getElementById('omegaVal');
omegaSlider.addEventListener('input', () => {
  const omega = parseFloat(omegaSlider.value);
  omegaVal.textContent = 'ω = ' + omega;
  drawRigidGraph(omega);
});

const massSlider = document.getElementById('massSlider');
const massVal    = document.getElementById('massVal');
massSlider.addEventListener('input', () => {
  const mass = parseFloat(massSlider.value);
  massVal.textContent = 'M = ' + mass.toFixed(1);
  drawKeplerGraph(mass);
});

const dmSlider = document.getElementById('dmSlider');
const dmVal    = document.getElementById('dmVal');
dmSlider.addEventListener('input', () => {
  const dm = parseFloat(dmSlider.value);
  dmVal.textContent = dm.toFixed(2);
  drawMilkyWay(dm);
});

drawRigidGraph(100);
drawKeplerGraph(1.0);
drawMilkyWay(0);

</script>
</body>
</html>
