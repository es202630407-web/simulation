<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>우리은하 회전 속도 곡선</title>
<style>
  body {
    font-family: 'Malgun Gothic', sans-serif;
    background: #0b0e1a;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }
  h1 { margin-bottom: 4px; }
  .sub { color: #9aa0c0; font-size: 14px; margin-bottom: 20px; }
  .container {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .panel {
    background: #161a2c;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  .slider-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 480px;
    justify-content: center;
  }
  input[type=range] {
    writing-mode: vertical-lr;
    direction: rtl;
    width: 30px;
    height: 300px;
  }
  .slider-label {
    margin: 10px 0;
    font-size: 14px;
    text-align: center;
    color: #ffd166;
  }
  .legend {
    display: flex;
    gap: 18px;
    justify-content: center;
    margin-top: 12px;
    font-size: 13px;
    flex-wrap: wrap;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 16px; height: 3px; display: inline-block; }
</style>
</head>
<body>

<h1>우리은하의 회전 속도 곡선</h1>
<div class="sub">암흑 물질의 양을 조절하면서 회전 속도 곡선이 어떻게 바뀌는지 확인해 보세요.</div>

<div class="container">
  <div class="panel">
    <canvas id="chart" width="600" height="480"></canvas>
    <div class="legend">
      <span><span class="swatch" style="background:#cfcfcf; border-top:2px dashed #cfcfcf;"></span>암흑물질 없음 (기준)</span>
      <span><span class="swatch" style="background:#ff8a8a; border-top:2px dashed #ff8a8a;"></span>암흑물질 충분 (기준)</span>
      <span><span class="swatch" style="background:#ff3b3b;"></span>현재 곡선</span>
    </div>
  </div>

  <div class="panel slider-box">
    <div class="slider-label">암흑물질 양</div>
    <input type="range" id="dmSlider" min="0" max="1" step="0.05" value="0">
    <div class="slider-label" id="dmValue">0.00</div>
  </div>
</div>

<script>
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');

// ---- 좌표 설정 ----
const margin = { left: 60, right: 20, top: 30, bottom: 50 };
const plotW = canvas.width - margin.left - margin.right;
const plotH = canvas.height - margin.top - margin.bottom;

const xMax = 15;   // kpc
const yMax = 270;  // km/s

function toPx(r, v) {
  const x = margin.left + (r / xMax) * plotW;
  const y = margin.top + plotH - (v / yMax) * plotH;
  return [x, y];
}

// ---- 우리은하 회전 속도 곡선 모형 ----
function rotationCurve(r, dmAmount) {
  if (r <= 1) {
    return 220 * r; // 강체 회전
  }
  const vKepler = 220 / Math.sqrt(r);
  const vFlat = 220;
  const blend = Math.min(Math.max((r - 1) / 2, 0), 1);
  return vKepler * (1 - blend * dmAmount) + vFlat * (blend * dmAmount);
}

function drawCurve(dmAmount, color, lineWidth, dashed) {
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  ctx.setLineDash(dashed ? [6, 4] : []);
  for (let i = 0; i <= 300; i++) {
    const r = (i / 300) * xMax;
    const v = rotationCurve(r === 0 ? 0.001 : r, dmAmount);
    const [x, y] = toPx(r, v);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

function draw(dmAmount) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 배경
  ctx.fillStyle = '#0e1224';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ---- 축 ----
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(margin.left, margin.top);
  ctx.lineTo(margin.left, margin.top + plotH);
  ctx.lineTo(margin.left + plotW, margin.top + plotH);
  ctx.stroke();

  // 격자 + 눈금
  ctx.fillStyle = '#9aa0c0';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  for (let r = 0; r <= xMax; r += 3) {
    const [x, y] = toPx(r, 0);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.moveTo(x, margin.top);
    ctx.lineTo(x, margin.top + plotH);
    ctx.stroke();
    ctx.fillText(r, x, y + 18);
  }
  ctx.textAlign = 'right';
  for (let v = 0; v <= yMax; v += 50) {
    const [x, y] = toPx(0, v);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.moveTo(margin.left, y);
    ctx.lineTo(margin.left + plotW, y);
    ctx.stroke();
    ctx.fillText(v, margin.left - 8, y + 4);
  }

  // 축 라벨
  ctx.fillStyle = '#cfd2e3';
  ctx.textAlign = 'center';
  ctx.font = '14px sans-serif';
  ctx.fillText('은하 중심에서부터의 거리 (kpc)', margin.left + plotW / 2, canvas.height - 12);

  ctx.save();
  ctx.translate(18, margin.top + plotH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('회전 속도 (km/s)', 0, 0);
  ctx.restore();

  // ---- 영역 구분선 ----
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.setLineDash([3, 3]);
  [1, 3].forEach(r => {
    const [x1, y1] = toPx(r, 0);
    const [x2, y2] = toPx(r, yMax);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  });
  ctx.setLineDash([]);

  ctx.fillStyle = '#9aa0c0';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('강체 회전', toPx(0.1, 0)[0], margin.top + 14);
  ctx.fillText('케플러 회전', toPx(1.2, 0)[0], margin.top + 14);
  ctx.fillText('평탄한 영역', toPx(6, 0)[0], margin.top + 14);

  // ---- 기준 곡선 ----
  drawCurve(0.0, '#cfcfcf', 1.5, true);
  drawCurve(1.0, '#ff8a8a', 1.5, true);

  // ---- 현재 곡선 ----
  drawCurve(dmAmount, '#ff3b3b', 3, false);

  // ---- 태양 위치 표시 ----
  const [sx, sy] = toPx(8.5, 220);
  ctx.strokeStyle = 'rgba(255,209,102,0.6)';
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(sx, margin.top);
  ctx.lineTo(sx, margin.top + plotH);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#ffd166';
  ctx.beginPath();
  // 별 모양 대신 원으로 표시
  ctx.arc(sx, sy, 5, 0, Math.PI * 2);
  ctx.fill();

  ctx.textAlign = 'left';
  ctx.fillText('태양 (8.5kpc, 220km/s)', sx + 8, sy - 8);
}

const slider = document.getElementById('dmSlider');
const dmValue = document.getElementById('dmValue');

function update() {
  const v = parseFloat(slider.value);
  dmValue.textContent = v.toFixed(2);
  draw(v);
}

slider.addEventListener('input', update);
update();
</script>

</body>
</html>
